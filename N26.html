<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>N26 截图工具 — 最终精调版</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; }

body {
  background: #1A1A1C;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 36px 24px;
  gap: 30px;
  flex-wrap: wrap;
}

/* ─── 控制面板 ─── */
.ctrl {
  width: 270px;
  background: #242424;
  border-radius: 22px;
  padding: 20px 16px;
  border: 1px solid #333;
  flex-shrink: 0;
}
.ctrl h3 { font-size:1.1rem; font-weight:700; color:#fff; margin-bottom:3px; }
.ctrl .sub {
  font-size:11px; color:#8e8e93; margin-bottom:18px;
  padding-left:8px; border-left:3px solid #2ED1C3;
}
.field { margin-bottom:12px; }
.field label { display:block; font-size:11px; font-weight:500; color:#aeaeb2; margin-bottom:5px; }
.ctrl input, .ctrl select {
  width:100%; padding:9px 11px;
  background:#151515; border:1px solid #2c2c2e;
  border-radius:10px; font-size:13px; color:#fff; outline:none;
}
.ctrl input:focus { border-color:#2ED1C3; }
.cbtn {
  width:100%; padding:11px; border-radius:12px; border:none;
  font-size:13px; font-weight:600; cursor:pointer; margin-top:10px;
}
.cbtn-teal { background:#2ED1C3; color:#111; }
.cbtn-dark { background:#2c2c2e; color:#fff; }

/* ─── 手机截图区域 ─── */
#capture {
  width: 393px;
  background: #000;
  color: #fff;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 700px;
}

/* ── 状态栏（优化版） ── */
.sbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 18px 6px;
  background: #000;
  flex-shrink: 0;
}
.sbar-time {
  font-size: 15px;
  font-weight: 590;
  letter-spacing: 0;
  font-variant-numeric: tabular-nums;
  color: #fff;
}
.sbar-right {
  display: flex;
  align-items: center;
  gap: 5px;
}

/* 信号条 - 精确iOS风格 */
.signal-bars {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 12px;
}
.signal-bars span {
  display: block;
  width: 2.5px;
  border-radius: 1px;
  background: #fff;
}
.signal-bars span:nth-child(1) { height: 3px; opacity: 0.35; }
.signal-bars span:nth-child(2) { height: 6px; opacity: 0.55; }
.signal-bars span:nth-child(3) { height: 9px; opacity: 0.75; }
.signal-bars span:nth-child(4) { height: 12px; opacity: 1; }

/* WiFi图标 - 精确弧线 */
.wifi-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 13px;
}
.wifi-icon svg {
  width: 17px;
  height: 12px;
}

/* 电池区域 */
.batt-wrap {
  display: flex;
  align-items: center;
  gap: 3px;
}
.batt-pct {
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  letter-spacing: -0.2px;
}
.batt-body {
  width: 24px;
  height: 11px;
  border: 1.2px solid rgba(255,255,255,0.7);
  border-radius: 3px;
  position: relative;
  background: transparent;
}
.batt-body::after {
  content: '';
  position: absolute;
  right: -4px;
  top: 50%;
  transform: translateY(-50%);
  width: 2.5px;
  height: 5px;
  background: rgba(255,255,255,0.6);
  border-radius: 0 1.5px 1.5px 0;
}
.batt-fill {
  position: absolute;
  left: 1.5px;
  top: 1.5px;
  height: calc(100% - 3px);
  border-radius: 1px;
  background: #fff;
  transition: width 0.1s;
}
.batt-fill.red { background: #ff3b30 !important; }

/* ── 返回栏 ── */
.back-bar {
  display: flex;
  align-items: center;
  padding: 4px 14px 6px 14px;
  background: #000;
  gap: 2px;
  flex-shrink: 0;
}
.back-bar span {
  font-size: 15px;
  font-weight: 500;
  color: #fff;
}

/* ── 内容区 - 自动撑满 ── */
.content {
  background: #111;
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* 下箭头 */
.chevron-row {
  padding: 14px 0 10px 18px;
  flex-shrink: 0;
}
.chevron-row svg {
  display: block;
}

.txn-name {
  font-size: 22px;
  font-weight: 630;
  color: #fff;
  padding: 0 20px;
  margin-top: 2px;
  letter-spacing: -0.3px;
  line-height: 1.2;
  flex-shrink: 0;
}
.txn-amount {
  font-size: 42px;
  font-weight: 700;
  color: #2ED1C3;
  padding: 4px 20px 0 20px;
  letter-spacing: -0.8px;
  line-height: 1.1;
  flex-shrink: 0;
}
.txn-date {
  font-size: 13px;
  font-weight: 400;
  color: #8E8E93;
  padding: 6px 20px 0 20px;
  flex-shrink: 0;
}

/* ── 操作按钮 ── */
.actions {
  display: flex;
  justify-content: center;
  gap: 36px;
  padding: 22px 20px 16px;
  flex-shrink: 0;
}
.action-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  width: 72px;
}
.act-circle {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.act-teal { background: #2ED1C3; }
.act-dark {
  background: transparent;
  border: 1.5px solid rgba(255,255,255,0.28);
}
.act-label {
  font-size: 10.5px;
  font-weight: 400;
  color: #8E8E93;
  text-align: center;
  line-height: 1.35;
}

/* ── 分区标题 ── */
.section-title {
  font-size: 20px;
  font-weight: 640;
  color: #fff;
  padding: 10px 20px 8px;
  letter-spacing: -0.2px;
  flex-shrink: 0;
}

/* ── 卡片 ── */
.card {
  margin: 0 14px 18px;
  background: #1c1c1e;
  border-radius: 13px;
  overflow: hidden;
  flex-shrink: 0;
}
.row {
  display: flex;
  align-items: center;
  padding: 13px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  gap: 12px;
  min-height: 58px;
}
.row:last-child { border-bottom: none; }

.ico {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.ico-gray  { background: #2c2c2e; }
.ico-teal  { background: #1d4040; }

.row-text { flex:1; min-width:0; }
.row-text .rlabel {
  font-size: 11.5px;
  font-weight: 400;
  color: #8E8E93;
  margin-bottom: 2px;
}
.row-text .rval {
  font-size: 15px;
  font-weight: 450;
  color: #fff;
}
.row-arrow {
  color: #636366;
  font-size: 18px;
  font-weight: 300;
  margin-left: 4px;
}
.row-copy { color: #636366; margin-left: 4px; }

.notiz-text {
  flex:1;
  font-size: 15px;
  font-weight: 400;
  color: #fff;
}

/* Tags 区域 - 放在底部 */
.tags-footer {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.tags-title {
  font-size: 20px;
  font-weight: 640;
  color: #fff;
  padding: 10px 20px 8px;
  letter-spacing: -0.2px;
  margin-top: 16px;
}
.tags-spacer {
  flex: 1;
  min-height: 20px;
}

.home-bar {
  height: 34px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 7px;
  background: #111;
  flex-shrink: 0;
  margin-top: auto;
}
.home-bar div {
  width: 134px;
  height: 5px;
  background: rgba(255,255,255,0.3);
  border-radius: 3px;
}
</style>
</head>
<body>

<!-- ═══════════ 控制面板 ═══════════ -->
<div class="ctrl">
  <h3>N26 截图工具</h3>
  <div class="sub">最终精调 · iOS字体</div>

  <div class="field"><label>👤 收款人姓名</label>
    <input id="i_name" value="Esteban Cuerva De La Fuente"></div>
  <div class="field"><label>💰 金额</label>
    <input id="i_amount" value="75,00 €"></div>
  <div class="field"><label>📅 交易日期</label>
    <input id="i_date" value="Mittwoch, 2. April 2025, 14:16"></div>
  <div class="field"><label>🏷️ 类别 (Kategorie)</label>
    <input id="i_kat" value="Gutschriften"></div>
  <div class="field"><label>🏦 收款账户 (Zu)</label>
    <input id="i_zu" value="Hauptkonto"></div>
  <div class="field"><label>🔄 交易类型</label>
    <input id="i_type" value="Echtzeitüberweisung"></div>
  <div class="field"><label>📝 用途备注</label>
    <input id="i_zweck" value="1"></div>
  <div class="field"><label>◀ 返回按钮文字</label>
    <input id="i_back" value="TikTok"></div>
  <div class="field"><label>🕐 状态栏时间</label>
    <input id="i_time" value="14:16"></div>
  <div class="field"><label>🔋 电池电量 (%)</label>
    <input id="i_batt" type="number" min="0" max="100" value="59"></div>

  <button class="cbtn cbtn-teal" onclick="refresh()">✨ 更新预览</button>
  <button class="cbtn cbtn-dark" onclick="doShot()">📸 导出 4K 截图</button>
</div>

<!-- ═══════════ 截图主区域 — 所有细节已优化 ═══════════ -->
<div id="capture">

  <!-- 状态栏 -->
  <div class="sbar">
    <span class="sbar-time" id="d_time">14:16</span>
    <div class="sbar-right">
      <div class="signal-bars">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="wifi-icon">
        <svg width="17" height="12" viewBox="0 0 20 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 5C6 2 14 2 18 5" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
          <path d="M4 7C7 5 13 5 16 7" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
          <path d="M7 9C9 8 11 8 13 9" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="10" cy="11" r="1.2" fill="white"/>
        </svg>
      </div>
      <div class="batt-wrap">
        <span class="batt-pct" id="d_bpct">59</span>
        <div class="batt-body">
          <div class="batt-fill" id="d_bfill" style="width:13px"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 返回栏 -->
  <div class="back-bar">
    <svg width="10" height="16" viewBox="0 0 10 16" fill="none" style="margin-right:3px">
      <path d="M8.5 1.5L1.5 8L8.5 14.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span id="d_back">TikTok</span>
  </div>

  <div class="content">
    <div class="chevron-row">
      <svg width="20" height="12" viewBox="0 0 20 12" fill="none">
        <path d="M2 2L10 10L18 2" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="txn-name" id="d_name">Esteban Cuerva De La Fuente</div>
    <div class="txn-amount" id="d_amount">75,00 €</div>
    <div class="txn-date" id="d_date">Mittwoch, 2. April 2025, 14:16</div>

    <!-- 操作按钮 -->
    <div class="actions">
      <div class="action-item">
        <div class="act-circle act-teal">
          <svg width="22" height="22" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="5" height="5" rx="1.2" stroke="#0A0A0A" stroke-width="1.5"/>
            <rect x="10" y="1" width="5" height="5" rx="1.2" stroke="#0A0A0A" stroke-width="1.5"/>
            <rect x="10" y="10" width="5" height="5" rx="1.2" stroke="#0A0A0A" stroke-width="1.5"/>
            <path d="M2.2 12H6M6 12L4.6 10.6M6 12L4.6 13.4"
                  stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="act-label">Geld an einen<br>Space senden</div>
      </div>

      <div class="action-item">
        <div class="act-circle act-dark">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path fill="white" d="M11 20v-7.6l-5-5V10H4V4h6v2H7.4l5.6 5.6V20zm3.85-9.4L13.4 9.15L16.6 6H14V4h6v6h-2V7.4z"/>
          </svg>
        </div>
        <div class="act-label">Einkommensverteil<br>er</div>
      </div>

      <div class="action-item">
        <div class="act-circle act-dark">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.92)" stroke-width="1.6"/>
            <line x1="12" y1="7" x2="12" y2="13" stroke="rgba(255,255,255,0.92)" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="12" cy="16.5" r="1.2" fill="rgba(255,255,255,0.92)"/>
          </svg>
        </div>
        <div class="act-label">Zum Support</div>
      </div>
    </div>

    <!-- Details 卡片 -->
    <div class="section-title">Details</div>
    <div class="card">
      <div class="row">
        <div class="ico ico-gray">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b5b5ba" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="13" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <div class="row-text">
          <div class="rlabel">Kategorie</div>
          <div class="rval" id="d_kat">Gutschriften</div>
        </div>
        <span class="row-arrow">›</span>
      </div>

      <div class="row">
        <div class="ico ico-teal">
          <svg width="22" height="16" viewBox="0 0 26 18" fill="none">
            <rect x="1" y="1" width="24" height="16" rx="2.5" fill="#2ED1C3"/>
            <rect x="1" y="6" width="24" height="3.5" fill="#1a5550"/>
            <rect x="3" y="11" width="7" height="2.5" rx="0.8" fill="#1a5550"/>
          </svg>
        </div>
        <div class="row-text">
          <div class="rlabel">Zu</div>
          <div class="rval" id="d_zu">Hauptkonto</div>
        </div>
      </div>

      <div class="row">
        <div class="ico ico-gray">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b5b5ba" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="14" height="11" rx="2"/>
            <rect x="7" y="8" width="14" height="11" rx="2"/>
          </svg>
        </div>
        <div class="row-text">
          <div class="rlabel">Transaktionstyp</div>
          <div class="rval" id="d_type">Echtzeitüberweisung</div>
        </div>
      </div>

      <div class="row">
        <div class="ico ico-gray">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b5b5ba" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            <line x1="8" y1="9" x2="16" y2="9"/>
            <line x1="8" y1="13" x2="13" y2="13"/>
          </svg>
        </div>
        <div class="row-text">
          <div class="rlabel">Verwendungszweck</div>
          <div class="rval" id="d_zweck">1</div>
        </div>
        <div class="row-copy">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#636366" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Notizen -->
    <div class="section-title">Notizen</div>
    <div class="card">
      <div class="row">
        <div class="ico ico-gray">
          <svg width="18" height="20" viewBox="0 0 20 24" fill="none" stroke="#b5b5ba" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2H5a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/>
            <polyline points="13 2 13 8 19 8"/>
          </svg>
        </div>
        <div class="notiz-text">Notiz hinzufügen</div>
        <span class="row-arrow">›</span>
      </div>
    </div>

    <!-- Tags 区域 - 放在底部 -->
    <div class="tags-footer">
      <div class="tags-title">Tags</div>
      <div class="tags-spacer"></div>
    </div>

  </div><!-- /content -->

  <div class="home-bar"><div></div></div>
</div><!-- /capture -->

<script>
function refresh() {
  const g = id => document.getElementById(id);
  const v = id => document.getElementById(id).value.trim();

  g('d_name').textContent   = v('i_name')   || 'Esteban Cuerva De La Fuente';
  g('d_amount').textContent = v('i_amount') || '75,00 €';
  g('d_date').textContent   = v('i_date')   || 'Mittwoch, 2. April 2025, 14:16';
  g('d_kat').textContent    = v('i_kat')    || 'Gutschriften';
  g('d_zu').textContent     = v('i_zu')     || 'Hauptkonto';
  g('d_type').textContent   = v('i_type')   || 'Echtzeitüberweisung';
  g('d_zweck').textContent  = v('i_zweck')  || '1';
  g('d_back').textContent   = v('i_back')   || 'TikTok';
  g('d_time').textContent   = v('i_time')   || '14:16';

  let pct = parseInt(v('i_batt'));
  if (isNaN(pct)) pct = 59;
  pct = Math.max(0, Math.min(100, pct));
  g('d_bpct').textContent = pct;
  const fw = Math.max(1, (pct / 100) * 19);
  const fill = g('d_bfill');
  fill.style.width = fw + 'px';
  fill.classList.toggle('red', pct <= 20);
}

async function doShot() {
  const btn = document.querySelectorAll('.cbtn')[1];
  const orig = btn.textContent;
  btn.textContent = '⏳ 生成中...';
  btn.disabled = true;
  refresh();
  await new Promise(r => setTimeout(r, 120));
  try {
    const el = document.getElementById('capture');
    const c = await html2canvas(el, {
      scale: 4,
      backgroundColor: '#000',
      logging: false,
      useCORS: false
    });
    const a = document.createElement('a');
    a.download = 'n26_' + Date.now() + '.png';
    a.href = c.toDataURL('image/png', 1.0);
    a.click();
  } catch(e) {
    alert('截图失败，请刷新后重试');
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}

document.querySelectorAll('input,select').forEach(el =>
  el.addEventListener('input', refresh));
refresh();
</script>
</body>
</html>
